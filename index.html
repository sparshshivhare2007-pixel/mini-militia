```html
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mini Militia - Survival</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link href="css/reset.css" rel="stylesheet" type="text/css"/>
    <link href="css/style.css" rel="stylesheet" type="text/css"/>

    <!-- Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
    <div class="wrapper">
        <canvas id="canvas"></canvas>

        <div id="messageBox" class="message noselect">
            <h3 id="messageHeading">SURVIVAL</h3>
            <div><span>SCORE: </span><span id="score"></span></div>
            <div><span>KILLS: </span><span id="kills"></span></div>

            <div id="respawn">
                <span>RESPAWNING: </span>
                <span id="respawn-value"></span>
            </div>

            <button id="retryButton" class="retryButton" onclick="location.reload();">
                Retry
            </button>
        </div>
    </div>

    <!-- Game Scripts -->
    <script src="js/Resources.js"></script>
    <script src="js/Preload.js"></script>
    <script src="js/CollisionHandler.js"></script>
    <script src="js/Constants.js"></script>
    <script src="js/Camera.js"></script>
    <script src="js/Bullet.js"></script>
    <script src="js/Weapon.js"></script>
    <script src="js/TileGround.js"></script>
    <script src="js/RobotUnit.js"></script>
    <script src="js/Util.js"></script>
    <script src="js/Actor.js"></script>
    <script src="js/Shyame.js"></script>
    <script src="js/Game.js"></script>

    <!-- Telegram + Mobile Fix -->
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function resizeCanvas() {
            let canvas = document.getElementById("canvas");
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // Disable scrolling on mobile
        document.body.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>

</body>
</html>
